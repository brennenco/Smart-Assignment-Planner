spring.application.name=planner-backend
# useUnicode + UTF-8 so course/assignment text (en dashes, etc.) round-trips correctly from MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/smart_assignment_planner?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=sap_user
spring.datasource.password=password123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Seed data comes from DataInitializer; do not run data.sql (avoids TRUNCATE conflicts)
spring.sql.init.mode=never
# Keep session cookie consistent for browser (same host: use http://localhost:8080 — not 127.0.0.1)
server.servlet.session.cookie.same-site=lax
server.servlet.session.tracking-modes=cookie
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Smart Assignment Planner</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
        .auth-wrap { max-width: 420px; margin: 3rem auto; padding: 0 1rem; }
        .auth-card { background: var(--panel); border: 1px solid var(--border); border-radius: 0.65rem; padding: 1.5rem; }
        .auth-card h1 { margin: 0 0 0.5rem; font-size: 1.25rem; }
        .auth-card label { display: block; margin-top: 0.75rem; font-weight: 600; font-size: 0.9rem; }
        .auth-card input { width: 100%; margin-top: 0.25rem; padding: 0.5rem; border: 1px solid var(--border); border-radius: 0.35rem; }
        .auth-card button { width: 100%; margin-top: 1.25rem; }
        .auth-error { color: #b91c1c; font-size: 0.9rem; margin-top: 0.75rem; }
        .auth-links { margin-top: 1rem; font-size: 0.9rem; }
        .auth-links a { color: var(--accent); }
    </style>
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <h1>Create account</h1>
            <p class="subtitle" style="margin:0">Smart Assignment Planner</p>
            <form id="regForm">
                <label for="name">Name</label>
                <input id="name" name="name" type="text" autocomplete="name" required />
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required />
                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="new-password" required minlength="6" />
                <p id="err" class="auth-error" hidden></p>
                <button type="submit">Register</button>
            </form>
            <p class="auth-links">Already have an account? <a href="/login.html">Sign in</a></p>
        </div>
    </div>
    <script>
        document.getElementById("regForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const err = document.getElementById("err");
            err.hidden = true;
            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const res = await fetch("/api/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify({ name, email, password })
            });
            if (!res.ok) {
                let msg = "Registration failed.";
                try {
                    const j = await res.json();
                    if (j.message) msg = j.message;
                } catch (_) { /* ignore */ }
                err.textContent = msg;
                err.hidden = false;
                return;
            }
            const me = await fetch("/api/auth/me", { credentials: "include" });
            if (!me.ok) {
                err.textContent = "Account created but session was not saved. Use http://localhost:8080 (not 127.0.0.1) and try clearing site cookies.";
                err.hidden = false;
                return;
            }
            window.location.href = "/";
        });
    </script>
</body>
</html>
